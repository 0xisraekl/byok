# ─────────────────────────────────────────────────────────────────────────────
#  BYOK Model Pool — YOUR models, YOUR keys
#
#  BYOK routes prompts by task fit, quality prior, price, context, latency,
#  tool support, spend limit, and privacy mode.
#
#  STRENGTHS (use these exact strings):
#    coding, reasoning, math, writing, summarization, extraction, data_analysis,
#    tool_calling, long_context, simple_chat, private, general
#
#  New fields:
#    quality_score: 0.0-1.0 general model quality prior
#    task_quality: per-task overrides; this is how BYOK knows every LLM is
#      amazing at different things.
# ─────────────────────────────────────────────────────────────────────────────

models:
  # ── LOCAL MODELS (free, private, no API key needed) ───────────────────────
  - name: "gemma3-local"
    provider: ollama
    model_id: "gemma3:6b"
    strengths:
      - simple_chat
      - summarization
      - extraction
      - private
    task_quality:
      simple_chat: 0.62
      summarization: 0.60
      extraction: 0.58
    quality_score: 0.58
    context_window: 8192
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    latency: medium
    supports_tools: false
    local: true
    enabled: true
    spend_limit_monthly_usd: 0
    priority: 1

