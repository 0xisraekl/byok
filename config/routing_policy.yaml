# BYOK routing policy
#
# This file defines default routing behavior for detected sub-agent roles.
# It is intentionally small and editable: Hermes/OpenClaw users can tune
# sub-agent budgets without touching Python code.

defaults:
  mode: balanced

agents:
  coding_agent:
    task: coding
    mode: balanced
    max_cost_usd: 0.004
    max_output_tokens: 1200

  research_agent:
    task: reasoning
    mode: quality
    max_cost_usd: 0.010
    max_output_tokens: 2000

  data_agent:
    task: data_analysis
    mode: balanced
    max_cost_usd: 0.006
    max_output_tokens: 1400

  writing_agent:
    task: writing
    mode: cheap
    max_cost_usd: 0.002
    max_output_tokens: 900

  summarization_agent:
    task: summarization
    mode: cheap
    max_cost_usd: 0.0015
    max_output_tokens: 700

  math_agent:
    task: math
    mode: quality
    max_cost_usd: 0.006
    max_output_tokens: 1400

  tool_agent:
    task: tool_calling
    mode: speed
    max_cost_usd: 0.003
    max_output_tokens: 700
